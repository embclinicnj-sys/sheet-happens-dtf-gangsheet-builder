<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheet Happens DTF Gang Sheet Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Bungee', sans-serif; background:#0f1c3a; color:#f0f8ff; text-align:center; }
    .container { max-width:1000px; margin:20px auto; padding:20px; background:#1a2b4e; border-radius:16px; }
    canvas { border:4px solid #00b4ff; border-radius:12px; margin:20px auto; display:block; background:#ffffff !important; }
    button, input, select { padding:10px 16px; margin:6px; border-radius:8px; font-size:16px; border:2px solid #00b4ff; background:#0f1c3a; color:#fff; cursor:pointer; }
    button:hover { background:#00b4ff; color:#000; }
    #status { font-size:20px; margin:15px; color:#00ff9d; }
    #drop-zone { border:3px dashed #00b4ff; border-radius:12px; padding:40px; margin:20px auto; max-width:800px; background:rgba(0,180,255,0.1); min-height:150px; display:flex; align-items:center; justify-content:center; font-size:22px; color:#aaa; cursor:pointer; transition:0.3s; }
    #drop-zone:hover, #drop-zone.dragover { border-color:#00ff9d; color:#00ff9d; background:rgba(0,255,157,0.2); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Sheet Happens DTF Gang Sheet Builder</h1>
    <div id="status">Initializing canvas...</div>

    <div id="drop-zone">Drag & Drop Images Here or Click to Upload</div>
    <input type="file" id="dtf-upload" accept="image/*" multiple style="display:none;">

    <div style="margin:20px;">
      <button onclick="addText()">Add Text</button>
      <button onclick="undoLast()">Undo</button>
      <button onclick="exportPNG()">Export PNG</button>
    </div>

    <canvas id="dtf-editor" width="900" height="1200"></canvas>
  </div>

  <script>
    let canvas;
    let history = [];

    function initCanvas() {
      canvas = new fabric.Canvas('dtf-editor', {
        width: 900,
        height: 1200,
        backgroundColor: '#ffffff',
        selection: true
      });
      document.getElementById('status').textContent = 'Canvas ready – white & locked. Drag images or click drop zone!';
      console.log('Canvas initialized successfully');
    }

    function saveState() {
      history.push(canvas.toJSON());
      if (history.length > 20) history.shift();
    }

    function undoLast() {
      if (history.length < 2) return;
      history.pop(); // remove current
      canvas.loadFromJSON(history[history.length - 1], canvas.renderAll.bind(canvas));
      document.getElementById('status').textContent = 'Undo applied';
    }

    function addText() {
      saveState();
      const text = new fabric.IText('Edit me', {
        left: 200,
        top: 200,
        fontFamily: 'Bungee',
        fontSize: 60,
        fill: '#000000'
      });
      canvas.add(text);
      canvas.setActiveObject(text);
      canvas.renderAll();
      document.getElementById('status').textContent = 'Text added – click to edit';
    }

    function exportPNG() {
      const dataUrl = canvas.toDataURL({ format: 'png', multiplier: 3 });
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'gang-sheet.png';
      a.click();
    }

    function handleFiles(files) {
      files = Array.from(files);
      if (files.length === 0) return;

      saveState();
      let added = 0;

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          fabric.Image.fromURL(ev.target.result, img => {
            if (!img) {
              console.error('Image load failed for', file.name);
              return;
            }
            img.scaleToWidth(400);
            img.set({
              left: (canvas.width - img.getScaledWidth()) / 2,
              top: (canvas.height - img.getScaledHeight()) / 2
            });
            canvas.add(img);
            canvas.setActiveObject(img);
            canvas.renderAll();
            added++;
            document.getElementById('status').textContent = `Added ${added}/${files.length} images`;
          }, { crossOrigin: 'anonymous' });
        };
        reader.readAsDataURL(file);
      });
    }

    // Event listeners
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    dropZone.addEventListener('click', () => document.getElementById('dtf-upload').click());

    document.getElementById('dtf-upload').addEventListener('change', e => handleFiles(e.target.files));

    // Start
    initCanvas();
  </script>
</body>
</html>

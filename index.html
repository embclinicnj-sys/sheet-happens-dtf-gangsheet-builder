<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheet Happens DTF Gang Sheet Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Bungee&family=Creepster&family=Exo+2:wght@700&family=Fredoka+One&family=Impact&family=Luckiest+Guy&family=Oswald:wght@700&family=Passion+One&family=Patua+One&family=Permanent+Marker&family=Righteous&family=Rock+Salt&family=Rubik+Beastly&family=Shojumaru&family=Sedgwick+Ave&family=Sigmar+One&family=Special+Elite&family=Staatliches&family=Titan+One&family=Unica+One&family=VT323&family=Wallpoet&family=Yeseva+One&family=Zen+Dots&family=Black+Han+Sans&family=Chewy&family=Concert+One&family=Diplomata+SC&family=Faster+One&family=Finger+Paint&family=Fruktur&family=Galada&family=Gruppo&family=Hind+Madurai:wght@700&family=IM+Fell+English+SC&family=Josefin+Sans:wght@700&family=Knewave&family=Modak&family=Monoton&family=Orbitron:wght@700&family=Paytone+One&family=Pirata+One&family=Press+Start+2P&family=Raleway+Dots&family=Reenie+Beanie&family=Rubik+Mono+One&family=Special+Elite&family=Syncopate:wght@700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { margin:0; font-family:'Bungee', sans-serif; background:#0f1c3a; color:#f0f8ff; }
    .container { max-width:1000px; margin:20px auto; padding:25px; background:#1a2b4e; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.6); position:relative; overflow:hidden; }
    .container.night-mode { background:#0a0e1a; color:#d0d0d0; }
    canvas { border:4px solid #00b4ff; border-radius:12px; margin:25px auto; display:block; z-index:1; touch-action:none; box-shadow:0 0 25px rgba(0,180,255,0.5); background:#ffffff !important; }
    button, select, input { padding:10px 16px; border-radius:8px; font-size:15px; border:2px solid #00b4ff; cursor:pointer; font-family:'Bungee',sans-serif; background:#0f1c3a; color:#fff; }
    button:hover { background:#00b4ff; color:#000; transform:scale(1.05); }
    #status { color:#00ff9d; font-weight:bold; text-align:center; margin:12px; font-size:20px; text-shadow:0 0 8px #00ff9d; }
    .tools { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:20px 0; align-items:center; }
    .text-controls, .glow-controls, .gradient-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .text-controls label, .glow-controls label, .gradient-controls label { color:#ccc; font-size:14px; }
    #drop-zone { border:3px dashed #00b4ff; border-radius:12px; padding:40px; text-align:center; margin:20px auto; max-width:800px; background:rgba(0,180,255,0.08); min-height:180px; display:flex; align-items:center; justify-content:center; font-size:20px; color:#aaa; transition:all 0.3s; cursor:pointer; }
    #drop-zone.dragover { border-color:#00ff9d; background:rgba(0,255,157,0.15); color:#00ff9d; box-shadow:0 0 20px rgba(0,255,157,0.3); }
    .shirt-tabs { margin:15px 0; text-align:center; display:none; }
    .shirt-tabs button { margin:0 10px; padding:8px 16px; background:#ff00aa; color:#fff; border:none; border-radius:8px; cursor:pointer; }
    .shirt-tabs button.active { background:#00ff9d; color:#000; }
    .gang-preview { margin-top:25px; display:flex; flex-wrap:wrap; gap:15px; justify-content:center; }
    .gang-preview img { width:150px; height:auto; border:3px solid #00b4ff; border-radius:10px; cursor:pointer; }
    .gang-preview img:hover { transform:scale(1.12); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
  <div class="container">
    <div id="graffiti-bg"></div>
    <h1>Sheet Happens DTF Gang Sheet Builder</h1>

    <div class="tools">
      <input type="file" id="dtf-upload" accept="image/*" multiple style="display:none;" />
      <button onclick="document.getElementById('dtf-upload').click()">Upload Images</button>
      <button onclick="dtfAddText()">Add Text</button>

      <!-- Glow -->
      <button onclick="addGlow()">Add Glow</button>
      <button onclick="removeGlow()">Remove Glow</button>
      <div class="glow-controls">
        <label>Glow Color:</label>
        <input type="color" id="glow-color" value="#ffffff">
        <label>Blur:</label>
        <input type="range" id="glow-blur" min="0" max="50" value="15" oninput="updateGlow()">
        <label>Spread:</label>
        <input type="range" id="glow-spread" min="0" max="30" value="8" oninput="updateGlow()">
      </div>

      <!-- Gradient -->
      <button onclick="applyGradient()">Apply Gradient</button>
      <button onclick="removeGradient()">Remove Gradient</button>
      <div class="gradient-controls">
        <label>Start:</label><input type="color" id="gradient-start" value="#ff0000">
        <label>End:</label><input type="color" id="gradient-end" value="#0000ff">
        <select id="gradient-type">
          <option value="linear-horizontal">Horizontal</option>
          <option value="linear-vertical">Vertical</option>
          <option value="radial">Radial</option>
        </select>
      </div>

      <!-- Shadow & Outline -->
      <button onclick="addShadow()">Add Shadow</button>
      <button onclick="removeShadow()">Remove Shadow</button>
      <input type="color" id="shadow-color" value="#000000">
      <input type="range" id="shadow-blur" min="0" max="30" value="8" oninput="updateShadow()">
      <input type="range" id="shadow-offset" min="0" max="20" value="5" oninput="updateShadow()">

      <button onclick="addOutline()">Add Outline</button>
      <button onclick="removeOutline()">Remove Outline</button>
      <input type="color" id="outline-color" value="#ffffff">
      <input type="range" id="outline-width" min="0" max="15" value="3" oninput="updateOutline()">

      <!-- Warp -->
      <button onclick="applyWarp('arc')">Arc Bend</button>
      <button onclick="applyWarp('bulge')">Bulge</button>
      <button onclick="applyWarp('wave')">Wave</button>
      <button onclick="applyWarp('arch')">Arch</button>
      <button onclick="resetWarp()">Reset Warp</button>

      <select id="dtf-font" onchange="changeFont()">
        <option value="Bungee">Bungee</option>
        <option value="Anton">Anton</option>
        <option value="Bangers">Bangers</option>
        <option value="Bebas Neue">Bebas Neue</option>
        <option value="Creepster">Creepster</option>
        <option value="Exo 2">Exo 2</option>
        <option value="Fredoka One">Fredoka One</option>
        <option value="Luckiest Guy">Luckiest Guy</option>
        <option value="Oswald">Oswald</option>
        <option value="Passion One">Passion One</option>
        <option value="Patua One">Patua One</option>
        <option value="Permanent Marker">Permanent Marker</option>
        <option value="Righteous">Righteous</option>
        <option value="Rock Salt">Rock Salt</option>
        <option value="Rubik Beastly">Rubik Beastly</option>
        <option value="Shojumaru">Shojumaru</option>
        <option value="Sedgwick Ave">Sedgwick Ave</option>
        <option value="Sigmar One">Sigmar One</option>
        <option value="Special Elite">Special Elite</option>
        <option value="Staatliches">Staatliches</option>
        <option value="Titan One">Titan One</option>
        <option value="Unica One">Unica One</option>
        <option value="VT323">VT323</option>
        <option value="Wallpoet">Wallpoet</option>
        <option value="Yeseva One">Yeseva One</option>
        <option value="Zen Dots">Zen Dots</option>
      </select>

      <input type="range" id="font-size" min="20" max="180" value="60" oninput="updateFontSize()">
      <label>Size</label>
      <input type="color" id="text-color" value="#000000" onchange="updateTextColor()">
      <label>Color</label>

      <button onclick="dtfUndo()">Undo</button>
      <button onclick="toggleBleed()">Bleed Lines</button>
      <button class="mode-toggle" onclick="toggleMode()">Shirt Mode</button>
    </div>

    <div id="shirt-tabs" class="shirt-tabs" style="display:none;">
      <button data-view="front" onclick="switchView('front')" class="tab-btn active">Front</button>
      <button data-view="back" onclick="switchView('back')" class="tab-btn">Back</button>
      <button data-view="sleeve" onclick="switchView('sleeve')" class="tab-btn">Sleeve</button>
    </div>

    <div id="drop-zone">Drag & Drop Images Here or Click to Upload</div>

    <canvas id="dtf-editor" width="900" height="1200"></canvas>

    <div id="status">Ready – add text or images</div>

    <div class="gang-preview" id="gang-preview"></div>

    <div style="margin-top:20px;">
      <button onclick="previewFullSheet()">Preview Full Sheet</button>
      <button onclick="dtfExport()">Add to Gang</button>
      <button onclick="dtfExportSVG()">Export SVG</button>
      <button onclick="batchExportSVG()">Batch Export SVG</button>
    </div>
  </div>

  <div id="full-preview" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
    <button id="close-preview" onclick="document.getElementById('full-preview').style.display='none'" style="position:absolute; top:20px; right:20px; background:#ff00aa; color:white; padding:10px 20px; border:none; border-radius:6px; cursor:pointer;">Close</button>
    <img id="full-sheet-img" src="" alt="Full Preview" style="max-width:90%; max-height:80%; border:5px solid #00ff9d; box-shadow:0 0 30px #00ff9d;" />
  </div>

  <script>
    let dtfCanvas, history = [], bleedVisible = false, isShirtMode = false, currentView = 'front', bleedRect;
    let dtfGang = [];

    window.addEventListener('load', () => {
      dtfCanvas = new fabric.Canvas('dtf-editor', {
        width: 900,
        height: 1200,
        backgroundColor: '#ffffff',
        preserveObjectStacking: true,
        selection: true
      });

      bleedRect = new fabric.Rect({
        left:50, top:50, width:800, height:1100,
        stroke:'#ff00aa', strokeWidth:2, strokeDashArray:[5,5],
        fill:'transparent', selectable:false, evented:false, visible:false
      });
      dtfCanvas.add(bleedRect);

      dtfCanvas.setBackgroundColor('#ffffff', dtfCanvas.renderAll.bind(dtfCanvas));

      const dropZone = document.getElementById('drop-zone');
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
      dropZone.addEventListener('click', () => document.getElementById('dtf-upload').click());

      document.getElementById('dtf-upload').addEventListener('change', e => handleFiles(e.target.files));

      document.getElementById('status').textContent = 'Ready – drag images or click upload';
    });

    function handleFiles(fileList) {
      const files = Array.from(fileList);
      if (files.length === 0) return;

      let loaded = 0;
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          fabric.Image.fromURL(ev.target.result, img => {
            if (!img) return;
            img.scaleToWidth(400);
            img.set({
              left: (dtfCanvas.width - img.getScaledWidth()) / 2,
              top: (dtfCanvas.height - img.getScaledHeight()) / 2
            });
            dtfCanvas.add(img);
            dtfCanvas.setActiveObject(img);
            dtfCanvas.renderAll();
            loaded++;
            document.getElementById('status').textContent = `Added ${loaded}/${files.length} images`;
          }, { crossOrigin: 'anonymous' });
        };
        reader.readAsDataURL(file);
      });
    }

    function dtfAddText() {
      const text = new fabric.IText('Edit me', {
        left: 200, top: 200,
        fontFamily: 'Bungee',
        fontSize: 60,
        fill: '#000000',
        editable: true,
        originX: 'center',
        originY: 'center'
      });

      dtfCanvas.add(text);
      dtfCanvas.setActiveObject(text);
      dtfCanvas.renderAll();
      document.getElementById('status').textContent = 'Text added – select to edit effects';
    }

    function changeFont() {
      const font = document.getElementById('dtf-font').value;
      const active = dtfCanvas.getActiveObject();
      if (active && active.type === 'i-text') {
        active.set({ fontFamily: font });
        dtfCanvas.renderAll();
      }
    }

    function updateFontSize() {
      const size = parseInt(document.getElementById('font-size').value);
      const active = dtfCanvas.getActiveObject();
      if (active && active.type === 'i-text') {
        active.set({ fontSize: size });
        dtfCanvas.renderAll();
      }
    }

    function updateTextColor() {
      const color = document.getElementById('text-color').value;
      const active = dtfCanvas.getActiveObject();
      if (active && active.type === 'i-text') {
        active.set({ fill: color });
        dtfCanvas.renderAll();
      }
    }

    // Glow
    function addGlow() {
      const active = dtfCanvas.getActiveObject();
      if (!active || active.type !== 'i-text') return;
      const color = document.getElementById('glow-color').value || '#ffffff';
      const blur = parseInt(document.getElementById('glow-blur').value) || 15;
      const spread = parseInt(document.getElementById('glow-spread').value) || 8;
      active.setShadow({
        color: color,
        blur: blur,
        offsetX: 0,
        offsetY: 0,
        spread: spread
      });
      dtfCanvas.renderAll();
    }

    function removeGlow() {
      const active = dtfCanvas.getActiveObject();
      if (active && active.type === 'i-text') {
        active.setShadow(null);
        dtfCanvas.renderAll();
      }
    }

    // Gradient
    function applyGradient() {
      const active = dtfCanvas.getActiveObject();
      if (!active || active.type !== 'i-text') return;
      const start = document.getElementById('gradient-start').value;
      const end = document.getElementById('gradient-end').value;
      const type = document.getElementById('gradient-type').value;

      let coords = { x1: 0, y1: 0, x2: 1, y2: 0 };
      if (type === 'linear-vertical') coords = { x1: 0, y1: 0, x2: 0, y2: 1 };
      if (type === 'radial') coords = { x1: active.width/2, y1: active.height/2, x2: active.width/2, y2: active.height/2, r1: 0, r2: active.width/2 };

      const gradient = new fabric.Gradient({
        type: type === 'radial' ? 'radial' : 'linear',
        coords: coords,
        colorStops: [{ offset: 0, color: start }, { offset: 1, color: end }]
      });

      active.set({ fill: gradient });
      dtfCanvas.renderAll();
    }

    function removeGradient() {
      const active = dtfCanvas.getActiveObject();
      if (active && active.type === 'i-text') {
        active.set({ fill: '#000000' });
        dtfCanvas.renderAll();
      }
    }

    // ... (add your other functions: shadow, outline, warp, undo, export, batch, toggleMode, switchView, etc. as needed)
  </script>
</body>
</html>
